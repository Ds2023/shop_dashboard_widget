<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shop Analytics</title>
    <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        ZOHO.embeddedApp.on("PageLoad", function (data) {

            const recordId = data.EntityId;

            if (!recordId) return;

            ZOHO.CRM.API.getRecord({
                Entity: "Accounts",
                RecordID: recordId
            }).then(function(response) {

                const record = response.data[0];
                const service = record.Service;

                if (service === "Shops") {
                    const baseUrl = "https://crmplus.zoho.com/reports/open-view/3019736000001587465";
                    const criteria = '"Shop Name"=\'' + recordId + '\'';
                    const fullUrl = baseUrl + "?ZOHO_CRITERIA=" + encodeURIComponent(criteria);

                    document.getElementById("container").innerHTML =
                        '<iframe frameborder="0" width="100%" height="600" src="' + fullUrl + '"></iframe>';
                } else {
                    // Collapse everything so no blank space shows
                    document.body.style.height = "0";
                    document.body.style.overflow = "hidden";
                    document.documentElement.style.height = "0";
                }
            });
        });

        ZOHO.embeddedApp.init();
    </script>
</body>
</html>
